[build]
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python manage.py migrate 2>&1 && gunicorn src.asgi:application --workers 1 -k uvicorn.workers.UvicornWorker --worker-tmp-dir /dev/shm --bind 0.0.0.0:$PORT --timeout 200 --preload --log-level debug --error-logfile - --access-logfile - 2>&1"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10


