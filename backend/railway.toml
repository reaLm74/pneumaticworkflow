[build]
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python manage.py migrate && python manage.py collectstatic --no-input && python manage.py init_periodic_tasks && python manage.py compilemessages && gunicorn src.asgi:application --workers 2 -k uvicorn.workers.UvicornWorker --worker-tmp-dir /dev/shm --bind 0.0.0.0:$PORT --timeout 200"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

