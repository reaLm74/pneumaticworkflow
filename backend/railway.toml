[build]
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -c \"import http.server; s = http.server.HTTPServer(('0.0.0.0', int(__import__('os').environ.get('PORT', '8000'))), http.server.SimpleHTTPRequestHandler); print('Server running on port', __import__('os').environ.get('PORT', '8000')); s.serve_forever()\""
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10


