[build]
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python manage.py migrate && gunicorn src.asgi:application --workers 1 -k uvicorn.workers.UvicornWorker --worker-tmp-dir /dev/shm --bind 0.0.0.0:$PORT --timeout 200 --log-level debug --error-logfile - --access-logfile -"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10


